<!DOCTYPE html>
<html>
    <head>
        <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/icon-32.png">
        <link rel="icon" type="image/png" sizes="16x16" href="/assets/img/icon-16.png">
        <meta charset="UTF-8">
        <title>Custom New Tab Options</title>
        <!-- Vendor CSS -->
        <link rel="stylesheet" href="/assets/css/vendor/bootstrap.css">
        <link rel="stylesheet" href="/assets/css/vendor/bootstrap-icons.css">
        <!-- CSS -->
        <link rel="stylesheet" href="/assets/css/main.css">
        <!-- Vendor JS -->
        <script defer="" src="/assets/js/vendor/bootstrap.bundle.min.js"></script>
        <!-- JS -->
        <script defer="" src="/assets/js/options.js"></script>
    </head>
    <body>
        <div class="container">
            <div class="row">
                <div class="col-md-12">
                    <h1><img src="/assets/img/icon.svg" alt=""> PN Custom New Tab</h1>
                    <p class="mb-5">This extension sets the browser's New Tab page to a custom value. When the new tab is created, this extension sets the focus on the page.</p>
                    <form id="options-form">
                        <div class="input-group mb-3">
                            <span class="input-group-text" id="basic-addon1">New Tab URL</span>
                            <input type="text" id="url" class="form-control" placeholder="https:// ..." aria-label="URL" aria-describedby="basic-addon1">
                        </div>

                        <button class="btn btn-primary" type="submit"><i class="bi bi-floppy"></i> Save</button>
                    </form>
                </div> <!-- .col-md-12 -->

            <!-- Save confirmation modal -->
            <div class="modal fade" id="saveModal" tabindex="-1" aria-labelledby="saveModalLabel" aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title" id="saveModalLabel"><i class="bi bi-check-circle-fill text-success"></i> Settings Saved</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body">
                            Your new tab URL has been saved successfully.
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                            <button type="button" class="btn btn-primary" id="redirectBtn"><i class="bi bi-box-arrow-up-right"></i> Go to New Tab</button>
                        </div>
                    </div>
                </div>
            </div>
            </div> <!-- .row -->
        </div> <!-- .container -->
    </body>
</html>
